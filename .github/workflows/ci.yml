name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    # Provide stub env vars so Next.js build does not fail on missing values
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_FAMILY_MONTHLY_PRICE_ID: price_placeholder
      STRIPE_FAMILY_ANNUAL_PRICE_ID: price_placeholder
      STRIPE_PREMIUM_MONTHLY_PRICE_ID: price_placeholder
      STRIPE_PREMIUM_ANNUAL_PRICE_ID: price_placeholder
      ELEVENLABS_API_KEY: placeholder
      AWS_ACCESS_KEY_ID: placeholder
      AWS_SECRET_ACCESS_KEY: placeholder
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: placeholder
      AWS_CLOUDFRONT_DOMAIN: placeholder.cloudfront.net
      NEXT_PUBLIC_APP_URL: https://placeholder.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
